<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よむカレ - あなたの日常を、新聞の1ページに。</title>
    <!-- 外部ライブラリの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        input:disabled, button:disabled { cursor: not-allowed; }
        /* スムーズな遷移のためのスタイル */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- ニュースナレッジベース (モックデータ) ---
        const NEWS_KNOWLEDGE_BASE = [
            { id: 101, month: 1, day: 1, title: "元旦の過ごし方、10年前は「福袋」今は「タイパ初詣」", category: "ライフ", trendScore: 90, content: "初詣の混雑回避のため、事前予約制を導入する神社が急増。効率重視の参拝へと変化しています。", insight: "豆知識：おみくじの順番は、一般的に大吉・中吉・小吉・吉・末吉・凶と言われています。" },
            { id: 111, month: 2, day: 11, title: "建国記念の日：日本の人口推移、20年前からの分岐点", category: "社会", trendScore: 85, content: "20年前と比較し、生産年齢人口の減少が顕著に。地方自治体では移住促進の取り組みを加速させています。", insight: "豆知識：日本の祝日は現在、年間16日あります。" },
            { id: 114, month: 2, day: 14, title: "バレンタイン市場、自分への『ご褒美チョコ』が主流に", category: "経済", trendScore: 92, content: "経済圏の変化。ギフトから自己投資へのシフトが鮮明です。", insight: "豆知識：チョコレートの原料カカオは、かつて通貨として使われていた時期があります。" },
            { id: 122, month: 2, day: 22, title: "猫の日：ペット経済圏が10年前の1.5倍、3兆円規模へ", category: "経済", trendScore: 95, content: "空前のペットブーム。AIを活用した自動給餌器やオンライン健康相談が急成長しています。", insight: "なるほど！：猫の可聴域は人間の3倍以上と言われています。" },
            { id: 301, title: "ガソリン価格、過去10年で最高水準を推移", category: "経済", trendScore: 95, content: "物流コストの増大が消費者物価を押し上げる要因となっています。", insight: "豆知識：ガソリンスタンドの看板価格は地域によって数円の差が出ます。" },
            { id: 302, title: "生成AIの利用率、前年比300%増の衝撃", category: "テクノロジー", trendScore: 98, content: "現在はビジネスパーソンの3人に1人が活用。情報の探し方が根本から変わろうとしています。", insight: "豆知識：AIに『ステップバイステップで』と指示すると、回答の精度が上がることがあります。" },
            { id: 324, month: 3, day: 24, title: "桜の開花予想、温暖化の影響で10日前倒し", category: "気象", trendScore: 88, content: "今年の桜前線は過去最速のペース。", insight: "豆知識：桜の木は、冬の寒さを経験することで休眠打破し、春に咲く準備を整えます。" },
            { id: 401, month: 4, day: 1, title: "新生活のサブスク、家具・家電のレンタルが急増", category: "ライフ", trendScore: 85, content: "所有から利用へ。レンタルサービスが定着しています。", insight: "豆知識：日本の「エイプリルフール」は、かつて「不義理の日」と呼ばれていました。" },
            { id: 901, title: "大谷翔平、打球速度が過去最高を記録", category: "スポーツ", trendScore: 92, content: "今シーズンの大谷選手の平均打球速度は時速180kmを超え、メジャーリーグの上位1%にランクイン。", insight: "豆知識：プロ野球ボールの縫い目の数は、世界共通で108個と決まっています。" },
            { id: 902, title: "睡眠負債、日本は世界ワーストレベルの結果", category: "健康", trendScore: 87, content: "日本人の平均睡眠時間は6時間27分でOECD諸国最位。", insight: "豆知識：週末の寝溜めは『社会的時差ボケ』を招く原因になることがあります。" },
        ];

        const CATEGORIES = {
            FIXED: ['経済', 'テクノロジー', 'ライフ'],
            EXTRA: ['スポーツ', '気象', 'グルメ', '健康', '社会', '海外', 'エンタメ']
        };

        const USER_OPTIONS = {
            GENDERS: [{ label: '男性', value: 'male' }, { label: '女性', value: 'female' }, { label: 'その他', value: 'other' }],
            AGES: ['20代以下', '30-40代', '50-60代', '70代以上'],
            ATTRIBUTES: [{ label: 'ビジネス', value: 'business' }, { label: '学生', value: 'student' }, { label: '子育て', value: 'parent' }, { label: '趣味人', value: 'hobby' }]
        };

        // --- ユーティリティ関数 ---
        const formatDateKey = (date) => {
            if (!date) return '';
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        };

        const getCalendarDays = (viewDate) => {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysCount = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysCount; i++) days.push(new Date(year, month, i));
            return days;
        };

        // --- コンポーネント ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && lucide[name]) {
                    iconRef.current.innerHTML = '';
                    const svg = lucide.createElement(lucide[name]);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    if (className) svg.setAttribute('class', className);
                    iconRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const CalendarGrid = ({ viewDate, onPrev, onNext, days, onDateClick, selectedDate, savedPapers, compact = false }) => (
            <div className={`bg-white rounded-3xl overflow-hidden ${compact ? '' : 'shadow-sm border border-slate-200 mb-6'}`}>
                <div className="p-4 flex justify-between items-center bg-slate-50 border-b border-slate-200">
                    <button onClick={onPrev} className="p-2 text-slate-400"><Icon name="ChevronLeft" size={20} /></button>
                    <h3 className="font-black text-slate-800">{viewDate.getFullYear()}年 {viewDate.getMonth() + 1}月</h3>
                    <button onClick={onNext} className="p-2 text-slate-400"><Icon name="ChevronRight" size={20} /></button>
                </div>
                <div className="p-4">
                    <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-300 mb-2">
                        {['日', '月', '火', '水', '木', '金', '土'].map(d => <div key={d}>{d}</div>)}
                    </div>
                    <div className="grid grid-cols-7 gap-1">
                        {days.map((date, i) => {
                            if (!date) return <div key={`empty-${i}`} />;
                            const isSelected = selectedDate && date.toDateString() === selectedDate.toDateString();
                            const isSaved = !!savedPapers[formatDateKey(date)];
                            return (
                                <button key={i} onClick={() => onDateClick(date)} className={`relative aspect-square rounded-full text-sm font-bold flex flex-col items-center justify-center transition-all ${isSelected ? 'bg-red-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-50'}`}>
                                    {date.getDate()}
                                    {isSaved && <div className={`absolute bottom-1 w-1 h-1 rounded-full ${isSelected ? 'bg-white' : 'bg-red-600'}`} />}
                                </button>
                            );
                        })}
                    </div>
                </div>
            </div>
        );

        const Layout = ({ children, title, subtitle, onBack, onHeaderClick, onCalendarClick, selectedDateStr, showGlobalCalendar, setShowGlobalCalendar, calendarProps }) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 pb-24 font-sans text-slate-900 w-full max-w-md mx-auto shadow-xl relative overflow-x-hidden fade-in">
                <header className="w-full flex justify-between items-center py-4 border-b border-slate-200 mb-6">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={onHeaderClick}>
                        <Icon name="Newspaper" className="text-red-600" size={32} />
                        <h1 className="text-2xl font-black tracking-tighter italic">よむカレ</h1>
                    </div>
                    <button onClick={onCalendarClick} className="bg-white border border-slate-200 px-3 py-1.5 rounded-full flex items-center gap-2 shadow-sm active:scale-95 transition-all">
                        <Icon name="Calendar" size={14} className="text-red-600" />
                        <span className="text-[11px] font-black text-slate-700 tracking-tighter">{selectedDateStr}</span>
                    </button>
                </header>
                <main className="w-full flex-1">
                    {title && (
                        <div className="mb-4 flex items-center justify-between">
                            <div>
                                <h2 className="text-xl font-bold border-l-4 border-red-600 pl-2 leading-none">{title}</h2>
                                {subtitle && <p className="text-[10px] text-slate-400 mt-1 pl-3">{subtitle}</p>}
                            </div>
                            {onBack && (
                                <button onClick={onBack} className="flex items-center gap-1 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-red-600 transition-colors">
                                    <Icon name="ArrowLeft" size={14} /> Back
                                </button>
                            )}
                        </div>
                    )}
                    {children}
                </main>
                {showGlobalCalendar && (
                    <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowGlobalCalendar(false)}>
                        <div className="bg-white w-full max-w-xs rounded-3xl overflow-hidden shadow-2xl" onClick={(e) => e.stopPropagation()}>
                            <CalendarGrid {...calendarProps} compact />
                            <button onClick={() => setShowGlobalCalendar(false)} className="w-full py-4 bg-slate-900 text-white font-bold text-sm">閉じる</button>
                        </div>
                    </div>
                )}
            </div>
        );

        // --- メインアプリケーション ---
        function App() {
            // ステート管理
            const [step, setStep] = useState('welcome');
            const [isRegistered, setIsRegistered] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [showGlobalCalendar, setShowGlobalCalendar] = useState(false);
            const [showSaveSuccess, setShowSaveSuccess] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            // ユーザーデータ
            const [userData, setUserData] = useState({ name: '', interests: [], gender: '', age: '', attribute: '' });
            const [savedPapers, setSavedPapers] = useState({});

            // エディタ・コンテンツ管理
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [viewDate, setViewDate] = useState(new Date());
            const [selectedNews, setSelectedNews] = useState([]);
            const [previewNews, setPreviewNews] = useState(null);
            const [diary, setDiary] = useState("");
            const [generatedContent, setGeneratedContent] = useState(null);
            const [displayCategories, setDisplayCategories] = useState([]);

            // 初期化
            useEffect(() => {
                const shuffled = [...CATEGORIES.EXTRA].sort(() => 0.5 - Math.random());
                setDisplayCategories([...CATEGORIES.FIXED, ...shuffled.slice(0, 3)]);
                try {
                    const savedUser = localStorage.getItem('yomucale_userdata');
                    if (savedUser) {
                        setUserData(JSON.parse(savedUser));
                        setIsRegistered(true);
                    }
                    const savedHistory = localStorage.getItem('yomucale_history');
                    if (savedHistory) setSavedPapers(JSON.parse(savedHistory));
                } catch (e) { console.error("LocalStorage error:", e); }
            }, []);

            // データの永続化
            useEffect(() => {
                if (isRegistered) {
                    localStorage.setItem('yomucale_userdata', JSON.stringify(userData));
                }
                localStorage.setItem('yomucale_history', JSON.stringify(savedPapers));
            }, [userData, isRegistered, savedPapers]);

            // ナビゲーションハンドラ
            const resetSession = useCallback(() => {
                setSelectedNews([]);
                setDiary("");
                setGeneratedContent(null);
                setPreviewNews(null);
                setStep('welcome');
            }, []);

            const handleFullReset = () => {
                localStorage.removeItem('yomucale_userdata');
                localStorage.removeItem('yomucale_history');
                setIsRegistered(false);
                setIsEditMode(false);
                setUserData({ name: '', interests: [], gender: '', age: '', attribute: '' });
                setSavedPapers({});
                setSelectedNews([]);
                setDiary("");
                setGeneratedContent(null);
                setShowResetConfirm(false);
                setStep('welcome');
            };

            const handleDateSelect = useCallback((date) => {
                setSelectedDate(date);
                const paper = savedPapers[formatDateKey(date)];
                if (paper) {
                    setGeneratedContent(paper);
                    setStep('preview');
                } else {
                    setSelectedNews([]);
                    setDiary("");
                    setStep('select_news');
                }
                setShowGlobalCalendar(false);
            }, [savedPapers]);

            const changeMonth = useCallback((offset) => {
                setViewDate(prev => new Date(prev.getFullYear(), prev.getMonth() + offset, 1));
            }, []);

            // ロジックハンドラ
            const toggleNewsSelection = (news) => {
                setSelectedNews(prev => {
                    const exists = prev.find(n => n.id === news.id);
                    if (exists) return prev.filter(n => n.id !== news.id);
                    return prev.length < 3 ? [...prev, news] : prev;
                });
            };

            const handleSave = () => {
                setSavedPapers(prev => ({ ...prev, [formatDateKey(selectedDate)]: generatedContent }));
                setShowSaveSuccess(true);
                setTimeout(() => setShowSaveSuccess(false), 2000);
            };

            // メモ化データ
            const calendarDays = useMemo(() => getCalendarDays(viewDate), [viewDate]);
            const filteredNews = useMemo(() => {
                const m = selectedDate.getMonth() + 1;
                const d = selectedDate.getDate();
                return NEWS_KNOWLEDGE_BASE.map(n => {
                    let score = n.trendScore || 0;
                    if (n.month === m && n.day === d) score += 10000;
                    if (userData.interests.includes(n.category)) score += 500;
                    return { ...n, finalScore: score };
                }).sort((a, b) => b.finalScore - a.finalScore).slice(0, 8);
            }, [userData.interests, selectedDate]);

            const selectedDateStr = selectedDate.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' });

            // プロップスバンドル
            const commonLayoutProps = {
                onHeaderClick: resetSession,
                onCalendarClick: () => { setViewDate(new Date(selectedDate)); setShowGlobalCalendar(true); },
                selectedDateStr,
                showGlobalCalendar,
                setShowGlobalCalendar,
                calendarProps: {
                    viewDate,
                    days: calendarDays,
                    onPrev: () => changeMonth(-1),
                    onNext: () => changeMonth(1),
                    onDateClick: handleDateSelect,
                    selectedDate,
                    savedPapers
                }
            };

            // 表示ビュー: ウェルカム画面
            if (step === 'welcome') return (
                <div className="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-8 text-center fade-in">
                    <Icon name="Newspaper" size={80} className="text-red-600 mb-6 animate-pulse" />
                    <h1 className="text-4xl font-black mb-2 italic tracking-tighter">よむカレ</h1>
                    <p className="text-lg opacity-80 mb-8">あなたの日常を、新聞の1ページに。</p>
                    
                    <div className="flex flex-col gap-4 w-full items-center">
                        <button 
                            onClick={() => { 
                                const today = new Date();
                                setSelectedDate(today);
                                setViewDate(today);
                                if (isRegistered) {
                                    setUserData(prev => ({ ...prev, interests: [] }));
                                    setIsEditMode(false);
                                }
                                setStep('register'); 
                            }} 
                            className="w-full max-w-[280px] bg-red-600 text-white px-8 py-4 rounded-full font-bold text-xl shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform"
                        >
                            {isRegistered ? '記者情報を確認' : 'はじめる'} <Icon name="ArrowRight" size={24} />
                        </button>
                        
                        {isRegistered && (
                            <button onClick={() => setShowResetConfirm(true)} className="flex items-center gap-1 text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors py-2 px-4 rounded-full border border-slate-700">
                                <Icon name="RotateCcw" size={14} /> すべてリセット
                            </button>
                        )}
                    </div>

                    {showResetConfirm && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-xs text-slate-900">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="AlertTriangle" size={32} />
                                </div>
                                <h3 className="text-xl font-black mb-2 text-center">データを消去しますか？</h3>
                                <p className="text-sm text-slate-500 mb-6 text-center leading-relaxed font-bold">
                                    これまでの登録情報、および保存された新聞はすべて消去されます。この操作は取り消せません。
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleFullReset} className="w-full py-4 bg-red-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">
                                        はい、リセットします
                                    </button>
                                    <button onClick={() => setShowResetConfirm(false)} className="w-full py-4 bg-slate-100 text-slate-500 font-black rounded-2xl active:scale-95 transition-all">
                                        キャンセル
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            // 表示ビュー: 記者登録
            if (step === 'register') {
                const canProceed = userData.name.trim() && userData.gender && userData.age && userData.attribute && userData.interests.length === 3;
                const isDisabledBasic = isRegistered && !isEditMode;

                return (
                    <Layout title="記者登録" subtitle="あなたに合わせて記事を最適化します" onBack={resetSession} {...commonLayoutProps}>
                        <div className="space-y-6">
                            {isRegistered && (
                                <div className="flex justify-end">
                                    <button 
                                        onClick={() => setIsEditMode(!isEditMode)} 
                                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-black transition-all shadow-sm ${isEditMode ? 'bg-red-600 text-white animate-pulse' : 'bg-slate-900 text-white'}`}
                                    >
                                        <Icon name={isEditMode ? "Check" : "Edit3"} size={14} /> 
                                        {isEditMode ? '完了' : '変更'}
                                    </button>
                                </div>
                            )}

                            {/* 記者名 */}
                            <div className={`p-5 rounded-2xl border transition-all ${isDisabledBasic ? 'bg-slate-100 border-slate-200' : 'bg-white border-slate-200 shadow-sm focus-within:border-red-500'}`}>
                                <div className="flex justify-between items-center mb-2">
                                    <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Journalist Name</label>
                                    {isDisabledBasic && <Icon name="Lock" size={10} className="text-slate-300" />}
                                </div>
                                <input 
                                    type="text" 
                                    value={userData.name} 
                                    onChange={(e) => !isDisabledBasic && setUserData(p => ({...p, name: e.target.value}))} 
                                    className={`w-full bg-transparent outline-none text-xl font-bold transition-all ${isDisabledBasic ? 'text-slate-400' : 'text-slate-800'}`} 
                                    placeholder="お名前を入力" 
                                    disabled={isDisabledBasic} 
                                />
                            </div>

                            {/* 基本情報 */}
                            <div className="space-y-4">
                                {[
                                    { label: 'Gender', key: 'gender', options: USER_OPTIONS.GENDERS, type: 'flat' },
                                    { label: 'Generation', key: 'age', options: USER_OPTIONS.AGES, type: 'grid' },
                                    { label: 'Attribute', key: 'attribute', options: USER_OPTIONS.ATTRIBUTES, type: 'grid' }
                                ].map(field => (
                                    <div key={field.key} className={`p-4 rounded-2xl border transition-all ${isDisabledBasic ? 'bg-slate-50 border-slate-100' : 'bg-white border-slate-200 shadow-sm'}`}>
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">{field.label}</label>
                                            {isDisabledBasic && <Icon name="Lock" size={10} className="text-slate-300" />}
                                        </div>
                                        <div className={field.type === 'grid' ? 'grid grid-cols-2 gap-2' : 'flex gap-2'}>
                                            {field.options.map(opt => {
                                                const val = typeof opt === 'string' ? opt : opt.value;
                                                const label = typeof opt === 'string' ? opt : opt.label;
                                                const active = userData[field.key] === val;
                                                return (
                                                    <button 
                                                        key={val} 
                                                        disabled={isDisabledBasic} 
                                                        onClick={() => setUserData(p => ({...p, [field.key]: val}))} 
                                                        className={`flex-1 py-2.5 rounded-xl text-xs font-bold border-2 transition-all ${
                                                            active 
                                                                ? (isDisabledBasic ? 'border-slate-200 bg-slate-200 text-slate-500' : 'border-red-600 bg-red-50 text-red-600') 
                                                                : 'border-slate-100 text-slate-400'
                                                        }`}
                                                    >
                                                        {label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* 関心事 */}
                            <div className="p-4 rounded-2xl border border-slate-200 bg-white shadow-sm">
                                <div className="flex justify-between items-center mb-3">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Interests (3つ選択: {userData.interests.length}/3)</label>
                                    <button onClick={() => setUserData(p => ({...p, interests: []}))} className="text-[10px] font-bold text-red-500 underline">リセット</button>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {displayCategories.map(cat => {
                                        const selected = userData.interests.includes(cat);
                                        return (
                                            <button 
                                                key={cat} 
                                                onClick={() => setUserData(p => ({...p, interests: selected ? p.interests.filter(c => c !== cat) : (p.interests.length < 3 ? [...p.interests, cat] : p.interests)}))} 
                                                className={`p-3 rounded-xl border-2 text-xs transition-all ${selected ? 'border-red-600 bg-red-50 text-red-600 font-bold' : 'border-slate-100 text-slate-500'}`}
                                            >
                                                {cat}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <button 
                                onClick={() => { setIsRegistered(true); setIsEditMode(false); setStep('select_date'); }} 
                                disabled={!canProceed || isEditMode} 
                                className={`w-full py-5 rounded-2xl font-black text-lg shadow-lg transition-all ${
                                    (!canProceed || isEditMode) ? 'bg-slate-300 text-slate-500' : 'bg-red-600 text-white active:scale-95'
                                }`}
                            >
                                {isEditMode ? '編集を完了させてください' : (isRegistered ? '設定を確定して次へ' : '登録して次へ')}
                            </button>
                        </div>
                    </Layout>
                );
            }

            // 表示ビュー: 日付選択
            if (step === 'select_date') return (
                <Layout title="日付の決定" subtitle="記録する日を選んでください" onBack={() => setStep('register')} {...commonLayoutProps}>
                    <CalendarGrid {...commonLayoutProps.calendarProps} />
                    <button onClick={() => handleDateSelect(selectedDate)} className="w-full py-5 rounded-2xl bg-slate-900 text-white font-bold text-lg active:scale-95 shadow-lg">決定して次へ</button>
                </Layout>
            );

            // 表示ビュー: 記事選定
            if (step === 'select_news') return (
                <Layout title="記事の選定" subtitle={`${selectedDateStr}の主要記事`} onBack={() => setStep('select_date')} {...commonLayoutProps}>
                    <div className="space-y-3 mb-6">
                        {filteredNews.map(news => {
                            const selected = selectedNews.find(n => n.id === news.id);
                            return (
                                <div key={news.id} onClick={() => setPreviewNews(news)} className={`p-4 rounded-2xl border flex items-center justify-between cursor-pointer transition-all active:scale-[0.98] ${selected ? 'border-red-600 bg-red-50 shadow-md' : 'border-slate-200 bg-white'}`}>
                                    <div className="flex-1 mr-4">
                                        <span className="text-[10px] font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded mr-2 uppercase">{news.category}</span>
                                        <h3 className="font-bold text-slate-800 text-sm inline">{news.title}</h3>
                                    </div>
                                    <div onClick={(e) => { e.stopPropagation(); toggleNewsSelection(news); }} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center shrink-0 transition-all ${selected ? 'bg-red-600 border-red-600 text-white' : 'border-slate-200 text-slate-200'}`}><Icon name={selected ? "Check" : "Plus"} size={20} /></div>
                                </div>
                            );
                        })}
                    </div>
                    <button disabled={selectedNews.length < 1} onClick={() => setStep('input_diary')} className={`w-full py-4 rounded-2xl font-bold text-lg transition-all ${selectedNews.length < 1 ? 'bg-slate-200 text-slate-400' : 'bg-red-600 text-white active:scale-95 shadow-lg'}`}>日記の執筆へ ({selectedNews.length}/3)</button>
                    {previewNews && (
                        <div className="fixed inset-0 z-[500] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[40px] overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
                                <div className="relative h-20 bg-red-600 flex items-center justify-center shrink-0">
                                    <div className="text-white font-black">記事詳細</div>
                                    <button onClick={() => setPreviewNews(null)} className="absolute right-6 w-10 h-10 bg-black/10 rounded-full flex items-center justify-center text-white"><Icon name="X" size={20} /></button>
                                </div>
                                <div className="p-8 overflow-y-auto">
                                    <h2 className="text-2xl font-black text-slate-900 mb-6">{previewNews.title}</h2>
                                    <div className="space-y-6">
                                        <div><label className="text-[10px] font-black text-slate-300 uppercase block mb-2 tracking-widest">Abstract</label><p className="text-slate-600 leading-relaxed font-bold">{previewNews.content}</p></div>
                                        <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100">
                                            <div className="flex items-center gap-2 mb-2"><Icon name="Info" size={16} className="text-red-500" /><span className="text-xs font-black text-slate-400 italic">Insight</span></div>
                                            <p className="text-sm font-bold text-slate-700 italic">{previewNews.insight}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t border-slate-100"><button onClick={() => { toggleNewsSelection(previewNews); setPreviewNews(null); }} className={`w-full py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all ${selectedNews.find(n => n.id === previewNews.id) ? 'bg-slate-200 text-slate-500' : 'bg-red-600 text-white'}`}>{selectedNews.find(n => n.id === previewNews.id) ? '解除する' : 'この記事を選ぶ'}</button></div>
                            </div>
                        </div>
                    )}
                </Layout>
            );

            // 表示ビュー: 日記入力
            if (step === 'input_diary') return (
                <Layout title="日誌の執筆" onBack={() => setStep('select_news')} {...commonLayoutProps}>
                    <div className="mb-4 flex flex-wrap gap-1">{selectedNews.map(n => <span key={n.id} className="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-full font-bold">#{n.title.substring(0,8)}...</span>)}</div>
                    <textarea rows={6} className="w-full p-5 rounded-2xl border-2 border-slate-200 outline-none text-lg mb-6 focus:border-red-500 bg-white transition-all shadow-sm" placeholder="今日という日は、どんな一日でしたか？" value={diary} onChange={(e) => setDiary(e.target.value)} />
                    <button onClick={() => { setGeneratedContent({ headline: diary.substring(0, 15) + (diary.length > 15 ? "..." : ""), date: selectedDateStr, author: userData.name, mainText: diary, news: selectedNews }); setStep('preview'); }} disabled={!diary.trim()} className="w-full py-5 rounded-2xl bg-red-600 text-white font-bold active:scale-95 shadow-lg">新聞を発行する</button>
                </Layout>
            );

            // 表示ビュー: 新聞プレビュー・保存
            if (step === 'preview') {
                const isSaved = !!savedPapers[formatDateKey(selectedDate)];
                return (
                    <Layout title={isSaved ? "アーカイブ" : "発行完了"} {...commonLayoutProps}>
                        <div className="w-full bg-[#fdfcf8] shadow-2xl border-[6px] border-slate-900 rounded-sm mb-6 p-6 font-serif relative overflow-hidden">
                            <div className="border-b-2 border-slate-900 pb-2 mb-4 flex justify-between items-end">
                                <div className="text-3xl font-black italic tracking-tighter text-slate-900">よむカレ新聞</div>
                                <div className="text-[10px] text-right leading-tight text-slate-600 font-sans font-bold">{generatedContent.date}発行<br />記者：{generatedContent.author}</div>
                            </div>
                            <h1 className="text-2xl font-black mb-6 leading-tight text-slate-900 decoration-red-600 underline decoration-4 underline-offset-4">{generatedContent.headline}</h1>
                            <div className="mb-6"><p className="text-sm leading-relaxed text-justify text-slate-800 first-letter:text-3xl first-letter:font-bold first-letter:mr-1 first-letter:float-left first-letter:text-red-600 whitespace-pre-wrap">{generatedContent.mainText}</p></div>
                            <div className="border-t-2 border-slate-200 pt-4 mt-6">
                                <h3 className="text-[10px] font-bold text-slate-400 mb-2 tracking-widest uppercase font-sans">Selected News Topics</h3>
                                <div className="space-y-3">{generatedContent.news?.map((n, idx) => (<div key={idx} className="bg-white/50 p-2 border-l-2 border-red-600 font-sans"><div className="text-[9px] font-black text-red-600">{n.category}</div><div className="text-xs font-bold text-slate-800 leading-tight">{n.title}</div></div>))}</div>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <button onClick={handleSave} disabled={isSaved} className={`flex items-center justify-center gap-2 py-4 rounded-2xl font-bold active:scale-95 shadow-sm transition-all ${isSaved ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-default' : 'bg-white border-2 border-slate-900 text-slate-900 hover:bg-slate-50'}`}><Icon name="Save" size={18} /> {isSaved ? '保存済み' : '保存する'}</button>
                            <button onClick={resetSession} className="flex items-center justify-center gap-2 py-4 rounded-2xl bg-slate-900 text-white font-bold active:scale-95 shadow-lg">トップへ</button>
                        </div>
                        {showSaveSuccess && <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-xl flex items-center gap-2 animate-bounce"><Icon name="Check" size={16} /> 保存しました</div>}
                    </Layout>
                );
            }
            return null;
        }

        // アプリケーションの描画
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
