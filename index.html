<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Manager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (UMD) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* Animation Utility */
        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Lucide Icons Wrapper
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svgString = lucide.createIcons({
                        icons: { [name]: icon },
                        attrs: {
                            width: size,
                            height: size,
                            'stroke-width': strokeWidth,
                            class: className
                        }
                    });
                }
            }, [name, size, strokeWidth, className]);

            // UMD版Lucideの簡易実装: 直接SVGを描画するためのコンポーネント
            const LucideIcon = () => {
                const icon = lucide.icons[name];
                if (!icon) return null;
                
                return (
                    <svg
                        width={size}
                        height={size}
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth={strokeWidth}
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        className={className}
                        dangerouslySetInnerHTML={{ __html: icon.map(i => {
                            const [tag, attrs] = i;
                            const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                            return `<${tag} ${attrStr}></${tag}>`;
                        }).join('') }}
                    />
                );
            };

            return <LucideIcon />;
        };

        const App = () => {
            // --- 状態管理 ---
            const [view, setView] = useState('button');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);
            const [schedules, setSchedules] = useState([{ id: 1, date: 'default', text: 'サンプル予定', priority: 0 }]);
            const [inputText, setInputText] = useState('');
            const [expandedItems, setExpandedItems] = useState({});

            // --- ヘルパー関数 ---
            const formatDateKey = (date) => date ? `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}` : '';
            const getScheduleCount = (day) => {
                if (!day) return 0;
                const key = `${currentDate.getFullYear()}-${currentDate.getMonth()}-${day}`;
                return schedules.filter(s => s.date === key).length;
            };

            // --- カレンダー計算 ---
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const days = useMemo(() => {
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                const result = [];
                for (let i = 0; i < firstDay; i++) result.push(null);
                for (let i = 1; i <= lastDate; i++) result.push(i);
                return result;
            }, [year, month]);

            // --- ハンドラ関数 ---
            const changeMonth = (offset) => setCurrentDate(new Date(year, month + offset, 1));
            const selectDay = (day) => {
                if (day) {
                    setSelectedDate(new Date(year, month, day));
                    setView('panel');
                }
            };
            const moveDate = (offset) => {
                if (!selectedDate) return;
                const next = new Date(selectedDate);
                next.setDate(selectedDate.getDate() + offset);
                setSelectedDate(next);
                if (next.getMonth() !== month || next.getFullYear() !== year) {
                    setCurrentDate(new Date(next.getFullYear(), next.getMonth(), 1));
                }
            };
            const addSchedule = () => {
                if (!inputText.trim()) return;
                const newEntry = { id: Date.now(), date: formatDateKey(selectedDate), text: inputText, priority: 0 };
                setSchedules([...schedules, newEntry]);
                setInputText('');
                setView('panel');
            };
            const deleteSchedule = (id) => setSchedules(schedules.filter(s => s.id !== id));
            const togglePriority = (id, level) => {
                setSchedules(prev => prev.map(s => s.id === id ? { ...s, priority: s.priority === level ? 0 : level } : s));
            };
            const toggleExpand = (id) => setExpandedItems(prev => ({ ...prev, [id]: !prev[id] }));

            // --- フィルタリング ---
            const currentKey = formatDateKey(selectedDate);
            const filteredSchedules = useMemo(() => {
                return schedules
                    .filter(s => s.date === currentKey)
                    .sort((a, b) => (b.priority - a.priority) || (a.id - b.id));
            }, [schedules, currentKey]);

            // --- コンポーネントパーツ ---
            const renderCalendarDay = (day, idx) => {
                if (!day) return <div key={`empty-${idx}`} className="opacity-0" />;
                const isToday = day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                const count = getScheduleCount(day);
                let bgClass = 'bg-transparent text-slate-700';
                if (isToday) bgClass = 'bg-indigo-600 text-white shadow-lg shadow-indigo-200';
                else if (count >= 5) bgClass = 'bg-rose-100 text-rose-900';
                else if (count >= 3) bgClass = 'bg-amber-100 text-amber-900';
                else if (count >= 1) bgClass = 'bg-slate-100';

                return (
                    <button key={idx} onClick={() => selectDay(day)} className={`h-16 flex flex-col items-center justify-center rounded-xl text-base font-black transition-all hover:scale-105 active:scale-95 ${bgClass}`}>
                        <span>{day}</span>
                        {count > 0 && (
                            <div className={`mt-0.5 flex items-center gap-0.5 text-[10px] font-bold ${isToday ? 'text-indigo-200' : 'opacity-80'}`}>
                                <div className={`w-1 h-1 rounded-full ${isToday ? 'bg-indigo-200' : 'bg-current'}`} />
                                <span>{count}</span>
                            </div>
                        )}
                    </button>
                );
            };

            const renderScheduleCard = (item) => {
                const isExpanded = expandedItems[item.id];
                return (
                    <div key={item.id} className="bg-indigo-50/30 px-4 py-2 rounded-2xl border border-indigo-100 flex flex-col animate-in">
                        <div className="flex items-center justify-between gap-3">
                            <div className="flex-1 flex flex-col justify-center min-h-[64px]">
                                <div className={`text-sm text-slate-800 font-bold overflow-hidden break-words leading-tight transition-all duration-300 ${!isExpanded ? 'line-clamp-2' : ''}`}>
                                    {item.text}
                                </div>
                                <div className="mt-1 flex justify-start">
                                    <button onClick={() => toggleExpand(item.id)} className="text-indigo-400 hover:text-indigo-600 text-[10px] font-black flex items-center gap-0.5 bg-white/50 px-1.5 py-0.5 rounded-md border border-indigo-50">
                                        {isExpanded ? <><Icon name="ChevronUp" size={12} /> 閉じる</> : <><Icon name="ChevronDown" size={12} /> 展開</>}
                                    </button>
                                </div>
                            </div>
                            <div className="flex flex-col items-center gap-1.5 flex-shrink-0 py-1">
                                <button onClick={() => deleteSchedule(item.id)} className="group flex flex-col items-center justify-center transition-all active:scale-90">
                                    <div className="bg-rose-100 text-rose-500 p-1.5 rounded-full group-hover:bg-rose-500 group-hover:text-white transition-colors">
                                        <Icon name="Check" size={14} strokeWidth={4} />
                                    </div>
                                    <span className="text-[10px] font-black text-rose-400 group-hover:text-rose-500 mt-0.5 tracking-tighter leading-none">done!</span>
                                </button>
                                <div className="flex flex-col gap-1 py-1 px-1 bg-white/50 rounded-full border border-indigo-50 shadow-sm">
                                    {[3, 2, 1].map(lvl => (
                                        <button key={lvl} onClick={() => togglePriority(item.id, lvl)} className={`w-2.5 h-2.5 rounded-full transition-all ${item.priority === lvl ? (lvl === 3 ? 'bg-rose-500' : lvl === 2 ? 'bg-amber-400' : 'bg-blue-500') : 'opacity-20 bg-slate-400'}`} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans select-none text-slate-900">
                    {view === 'button' && (
                        <button className="w-24 h-24 bg-indigo-600 text-white rounded-3xl shadow-xl flex items-center justify-center hover:bg-indigo-700 transition-all border-4 border-white" onClick={() => setView('calendar')}>
                            <Icon name="Calendar" size={40} />
                        </button>
                    )}
                    {view === 'calendar' && (
                        <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                            <div className="bg-indigo-600 p-8 text-white flex justify-between items-center">
                                <div><h2 className="text-2xl font-bold">{year}年</h2><p className="text-indigo-100 font-bold">{month + 1}月</p></div>
                                <div className="flex gap-2">
                                    <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-white/10 rounded-lg"><Icon name="ChevronLeft" /></button>
                                    <button onClick={() => changeMonth(1)} className="p-2 hover:bg-white/10 rounded-lg"><Icon name="ChevronRight" /></button>
                                    <button onClick={() => setView('button')} className="p-2 hover:bg-white/10 rounded-lg"><Icon name="X" /></button>
                                </div>
                            </div>
                            <div className="p-6">
                                <div className="grid grid-cols-7 mb-4 text-center text-xs font-black text-slate-400 uppercase tracking-widest">{['日', '月', '火', '水', '木', '金', '土'].map(d => <div key={d}>{d}</div>)}</div>
                                <div className="grid grid-cols-7 gap-2">{days.map((day, i) => renderCalendarDay(day, i))}</div>
                            </div>
                        </div>
                    )}
                    {view === 'panel' && (
                        <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl border-t-8 border-indigo-600 flex flex-col max-h-[80vh]">
                            <div className="px-6 py-4 border-b flex justify-between items-center bg-slate-50/50">
                                <button onClick={() => moveDate(-1)} className="p-2 text-slate-400 hover:bg-slate-200 rounded-xl transition-colors"><Icon name="ChevronLeft" size={24} strokeWidth={3} /></button>
                                <h2 className="text-xl font-black text-slate-800">{selectedDate?.toLocaleDateString('ja-JP')}</h2>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => moveDate(1)} className="p-2 text-slate-400 hover:bg-slate-200 rounded-xl transition-colors"><Icon name="ChevronRight" size={24} strokeWidth={3} /></button>
                                    <button onClick={() => setView('calendar')} className="p-2 text-slate-400 hover:bg-slate-200 rounded-full transition-colors ml-2"><Icon name="X" size={24} strokeWidth={3} /></button>
                                </div>
                            </div>
                            <div className="p-4 overflow-y-auto flex-1 space-y-2">
                                {filteredSchedules.length > 0 ? filteredSchedules.map(renderScheduleCard) : <div className="text-center py-6"><p className="text-slate-400 font-bold">予定がありません</p></div>}
                                <button onClick={() => setView('edit')} className="w-full py-4 bg-indigo-600 text-white rounded-2xl flex items-center justify-center gap-2 hover:bg-indigo-700 active:scale-[0.98] transition-all font-black shadow-lg shadow-indigo-100 mt-2">
                                    <Icon name="Plus" size={20} strokeWidth={3} /> 予定を追加
                                </button>
                            </div>
                        </div>
                    )}
                    {view === 'edit' && (
                        <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
                            <div className="p-6 bg-slate-50 border-b flex items-center gap-3">
                                <button onClick={() => setView('panel')} className="p-2 text-slate-400 hover:bg-slate-200 rounded-xl transition-colors"><Icon name="ArrowLeft" size={24} strokeWidth={3} /></button>
                                <h2 className="font-black text-slate-800 text-lg">予定を記入</h2>
                            </div>
                            <div className="p-6 space-y-6">
                                <textarea autoFocus value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="何をする予定ですか？" className="w-full h-56 p-6 bg-slate-50 border-2 border-transparent rounded-3xl focus:border-indigo-500 focus:bg-white transition-all outline-none font-bold text-slate-800 text-lg resize-none placeholder:text-slate-300" />
                                <button onClick={addSchedule} disabled={!inputText.trim()} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-[0.98] transition-all hover:bg-indigo-700 flex items-center justify-center gap-2 disabled:opacity-30">
                                    <Icon name="Check" size={24} strokeWidth={3} /> 登録する
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
