<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よむカレ - あなたの日常を、新聞の1ページに</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* スクロールバー非表示 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // アイコンコンポーネントの修正版
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const [svgContent, setSvgContent] = useState("");

            useEffect(() => {
                // Lucideアイコンのデータ構造解析の修正
                if (window.lucide && window.lucide.icons[name]) {
                    const iconData = window.lucide.icons[name];
                    
                    // iconData[1] が配列であることを確認してから map を実行
                    if (Array.isArray(iconData) && Array.isArray(iconData[1])) {
                        const paths = iconData[1].map(item => {
                            const tagName = item[0];
                            const attrs = Object.entries(item[1])
                                .map(([k, v]) => `${k}="${v}"`)
                                .join(' ');
                            return `<${tagName} ${attrs} />`;
                        }).join('');
                        setSvgContent(paths);
                    } else {
                        // データ構造が期待と異なる場合のフォールバック（SVG文字列として扱うなど）
                        console.warn(`Unexpected icon data format for: ${name}`);
                    }
                }
            }, [name]);

            if (!svgContent) return <div style={{width: size, height: size}} className={className}></div>;

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth={strokeWidth}
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svgContent }}
                />
            );
        };

        // --- 定数定義 ---
        const NEWS_KNOWLEDGE_BASE = [
            { id: 101, month: 1, day: 1, title: "元旦の過ごし方、10年前は「福袋」今は「タイパ初詣」", category: "ライフ", trendScore: 90, content: "初詣の混雑回避のため、事前予約制を導入する神社が急増。効率重視の参拝へと変化しています。", insight: "豆知識：おみくじの順番は、一般的に大吉・中吉・小吉・吉・末吉・凶と言われています。" },
            { id: 111, month: 2, day: 11, title: "建国記念の日：日本の人口推移、20年前からの分岐点", category: "社会", trendScore: 85, content: "20年前と比較し、生産年齢人口の減少が顕著に。地方自治体では移住促進の取り組みを加速させています。", insight: "豆知識：日本の祝日は現在、年間16日あります。" },
            { id: 114, month: 2, day: 14, title: "バレンタイン市場、自分への『ご褒美チョコ』が主流に", category: "経済", trendScore: 92, content: "経済圏の変化。ギフトから自己投資へのシフトが鮮明です。", insight: "豆知識：チョコレートの原料カカオは、かつて通貨として使われていた時期があります。" },
            { id: 122, month: 2, day: 22, title: "猫の日：ペット経済圏が10年前の1.5倍、3兆円規模へ", category: "経済", trendScore: 95, content: "空前のペットブーム。AIを活用した自動給餌器やオンライン健康相談が急成長しています。", insight: "なるほど！：猫の可聴域は人間の3倍以上と言われています。" },
            { id: 301, title: "ガソリン価格、過去10年で最高水準を推移", category: "経済", trendScore: 95, content: "物流コストの増大が消費者物価を押し上げる要因となっています。", insight: "豆知識：ガソリンスタンドの看板価格は地域によって数円の差が出ます。" },
            { id: 302, title: "生成AIの利用率、前年比300%増の衝撃", category: "テクノロジー", trendScore: 98, content: "現在はビジネスパーソンの3人に1人が活用。情報の探し方が根本から変わろうとしています。", insight: "豆知識：AIに『ステップバイステップで』と指示すると、回答の精度が上がることがあります。" },
            { id: 324, month: 3, day: 24, title: "桜の開花予想、温暖化の影響で10日前倒し", category: "気象", trendScore: 88, content: "今年の桜前線は過去最速のペース。", insight: "豆知識：桜の木は、冬の寒さを経験することで休眠打破し、春に咲く準備を整えます。" },
            { id: 401, month: 4, day: 1, title: "新生活のサブスク、家具・家電のレンタルが急増", category: "ライフ", trendScore: 85, content: "所有から利用へ。レンタルサービスが定着しています。", insight: "豆知識：日本の「エイプリルフール」は、かつて「不義理の日」と呼ばれていました。" },
            { id: 901, title: "大谷翔平、打球速度が過去最高を記録", category: "スポーツ", trendScore: 92, content: "今シーズンの大谷選手の平均打球速度は時速180kmを超え、メジャーリーグの上位1%にランクイン。", insight: "豆知識：プロ野球ボールの縫い目の数は、世界共通で108個と決まっています。" },
            { id: 902, title: "睡眠負債、日本は世界ワーストレベルの結果", category: "健康", trendScore: 87, content: "日本人の平均睡眠時間は6時間27分でOECD諸国最下位。", insight: "豆知識：週末の寝溜めは『社会的時差ボケ』を招く原因になることがあります。" },
        ];

        const CATEGORIES = {
            FIXED: ['経済', 'テクノロジー', 'ライフ'],
            EXTRA: ['スポーツ', '気象', 'グルメ', '健康', '社会', '海外', 'エンタメ']
        };

        const USER_OPTIONS = {
            GENDERS: [{ label: '男性', value: 'male' }, { label: '女性', value: 'female' }, { label: 'その他', value: 'other' }],
            AGES: ['20代以下', '30-40代', '50-60代', '70代以上'],
            ATTRIBUTES: [{ label: 'ビジネス', value: 'business' }, { label: '学生', value: 'student' }, { label: '子育て', value: 'parent' }, { label: '趣味人', value: 'hobby' }]
        };

        // --- ユーティリティ ---
        const formatDateKey = (date) => {
            if (!date) return '';
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        };

        const getCalendarDays = (viewDate) => {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysCount = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysCount; i++) days.push(new Date(year, month, i));
            return days;
        };

        // --- コンポーネント ---
        const CalendarGrid = ({ viewDate, onPrev, onNext, days, onDateClick, selectedDate, savedPapers, compact = false }) => (
            <div className={`bg-white rounded-3xl overflow-hidden ${compact ? '' : 'shadow-sm border border-slate-200 mb-6'}`}>
                <div className="p-4 flex justify-between items-center bg-slate-50 border-b border-slate-200">
                    <button onClick={onPrev} className="p-2 text-slate-400"><Icon name="ChevronLeft" size={20} /></button>
                    <h3 className="font-black text-slate-800">{viewDate.getFullYear()}年 {viewDate.getMonth() + 1}月</h3>
                    <button onClick={onNext} className="p-2 text-slate-400"><Icon name="ChevronRight" size={20} /></button>
                </div>
                <div className="p-4">
                    <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-300 mb-2">
                        {['日', '月', '火', '水', '木', '金', '土'].map(d => <div key={d}>{d}</div>)}
                    </div>
                    <div className="grid grid-cols-7 gap-1">
                        {days.map((date, i) => {
                            if (!date) return <div key={`empty-${i}`} />;
                            const isSelected = selectedDate && date.toDateString() === selectedDate.toDateString();
                            const isSaved = !!savedPapers[formatDateKey(date)];
                            return (
                                <button 
                                    key={i} 
                                    onClick={() => onDateClick(date)} 
                                    className={`relative aspect-square rounded-full text-sm font-bold flex flex-col items-center justify-center transition-all ${isSelected ? 'bg-red-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-50'}`}
                                >
                                    {date.getDate()}
                                    {isSaved && <div className={`absolute bottom-1 w-1 h-1 rounded-full ${isSelected ? 'bg-white' : 'bg-red-600'}`} />}
                                </button>
                            );
                        })}
                    </div>
                </div>
            </div>
        );

        const Layout = ({ children, title, subtitle, onBack, onHeaderClick, showGlobalCalendar, setShowGlobalCalendar, calendarProps, showScheduleTool }) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 pb-24 font-sans text-slate-900 w-full max-w-md mx-auto shadow-xl relative overflow-x-hidden">
                <header className="w-full flex justify-between items-center py-4 border-b border-slate-200 mb-6">
                    <div className="flex items-center gap-2">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={onHeaderClick}>
                            <Icon name="Newspaper" className="text-red-600" size={32} />
                            <h1 className="text-2xl font-black tracking-tighter italic">よむカレ</h1>
                        </div>
                        {showScheduleTool && <ScheduleManager compactHeader={true} />}
                    </div>
                </header>
                <main className="w-full flex-1 animate-in">
                    {title && (
                        <div className="mb-4 flex items-center justify-between">
                            <div>
                                <h2 className="text-xl font-bold border-l-4 border-red-600 pl-2 leading-none">{title}</h2>
                                {subtitle && <p className="text-[10px] text-slate-400 mt-1 pl-3">{subtitle}</p>}
                            </div>
                            {onBack && (
                                <button onClick={onBack} className="flex items-center gap-1 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-red-600 transition-colors">
                                    <Icon name="ArrowLeft" size={14} /> Back
                                </button>
                            )}
                        </div>
                    )}
                    {children}
                </main>
                {showGlobalCalendar && (
                    <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowGlobalCalendar(false)}>
                        <div className="bg-white w-full max-w-xs rounded-3xl overflow-hidden shadow-2xl" onClick={(e) => e.stopPropagation()}>
                            <CalendarGrid {...calendarProps} compact />
                            <button onClick={() => setShowGlobalCalendar(false)} className="w-full py-4 bg-slate-900 text-white font-bold text-sm">閉じる</button>
                        </div>
                    </div>
                )}
            </div>
        );

        const ScheduleManager = ({ compactHeader = false }) => {
            const [view, setView] = useState('button');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null);
            const [schedules, setSchedules] = useState([]);
            const [inputText, setInputText] = useState('');
            const [expandedItems, setExpandedItems] = useState({});

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const formatDateKeyInner = (date) => date ? `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}` : '';
            
            const getScheduleCount = (day) => {
                const key = `${year}-${month}-${day}`;
                return schedules.filter(s => s.date === key).length;
            };

            const days = useMemo(() => {
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                const result = [];
                for (let i = 0; i < firstDay; i++) result.push(null);
                for (let i = 1; i <= lastDate; i++) result.push(i);
                return result;
            }, [year, month]);

            const changeMonth = (offset) => setCurrentDate(new Date(year, month + offset, 1));
            const selectDay = (day) => { if (day) { setSelectedDate(new Date(year, month, day)); setView('panel'); } };
            const moveDate = (offset) => {
                if (!selectedDate) return;
                const next = new Date(selectedDate);
                next.setDate(selectedDate.getDate() + offset);
                setSelectedDate(next);
                if (next.getMonth() !== month || next.getFullYear() !== year) setCurrentDate(new Date(next.getFullYear(), next.getMonth(), 1));
            };

            const addSchedule = () => {
                if (!inputText.trim()) return;
                setSchedules([...schedules, { id: Date.now(), date: formatDateKeyInner(selectedDate), text: inputText, priority: 0 }]);
                setInputText('');
                setView('panel');
            };

            const deleteSchedule = (id) => setSchedules(schedules.filter(s => s.id !== id));
            const togglePriority = (id, level) => setSchedules(prev => prev.map(s => s.id === id ? { ...s, priority: s.priority === level ? 0 : level } : s));
            const toggleExpand = (id) => setExpandedItems(prev => ({ ...prev, [id]: !prev[id] }));

            const currentKey = formatDateKeyInner(selectedDate);
            const filteredSchedules = useMemo(() => schedules.filter(s => s.date === currentKey).sort((a, b) => (b.priority - a.priority) || (a.id - b.id)), [schedules, currentKey]);

            return (
                <div className={compactHeader ? "ml-1" : "fixed inset-0 z-[100] pointer-events-none"}>
                    {view === 'button' && (
                        <button className={compactHeader ? "pointer-events-auto p-2 bg-indigo-600 text-white rounded-xl shadow-md" : "pointer-events-auto fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center"} onClick={() => setView('calendar')}>
                            <Icon name="Calendar" size={compactHeader ? 18 : 32} />
                        </button>
                    )}
                    {view !== 'button' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 pointer-events-auto" onClick={() => setView('button')}>
                            <div className="w-full max-w-md" onClick={e => e.stopPropagation()}>
                                {view === 'calendar' && (
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-in">
                                        <div className="bg-indigo-600 p-8 text-white flex justify-between items-center">
                                            <div><h2 className="text-2xl font-bold">{year}年</h2><p className="text-indigo-100 font-bold">{month + 1}月</p></div>
                                            <div className="flex gap-2">
                                                <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-white/10 rounded-lg"><Icon name="ChevronLeft" /></button>
                                                <button onClick={() => changeMonth(1)} className="p-2 hover:bg-white/10 rounded-lg"><Icon name="ChevronRight" /></button>
                                                <button onClick={() => setView('button')} className="p-2 hover:bg-white/10 rounded-lg"><Icon name="X" /></button>
                                            </div>
                                        </div>
                                        <div className="p-6">
                                            <div className="grid grid-cols-7 mb-4 text-center text-xs font-black text-slate-400">
                                                {['日', '月', '火', '水', '木', '金', '土'].map(d => <div key={d}>{d}</div>)}
                                            </div>
                                            <div className="grid grid-cols-7 gap-2">
                                                {days.map((day, idx) => (
                                                    <button key={idx} onClick={() => selectDay(day)} className={`h-12 flex flex-col items-center justify-center rounded-xl font-black ${day ? (getScheduleCount(day) > 0 ? 'bg-indigo-50 text-indigo-600' : 'text-slate-700') : 'opacity-0 cursor-default'}`}>
                                                        {day}
                                                        {day && getScheduleCount(day) > 0 && <div className="w-1 h-1 bg-indigo-600 rounded-full mt-0.5"></div>}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {view === 'panel' && (
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl flex flex-col max-h-[70vh] animate-in">
                                        <div className="p-6 border-b flex justify-between items-center">
                                            <button onClick={() => moveDate(-1)} className="p-2 text-slate-400"><Icon name="ChevronLeft" /></button>
                                            <h2 className="text-lg font-black">{selectedDate?.toLocaleDateString('ja-JP')}</h2>
                                            <button onClick={() => moveDate(1)} className="p-2 text-slate-400"><Icon name="ChevronRight" /></button>
                                        </div>
                                        <div className="p-4 overflow-y-auto flex-1 space-y-2">
                                            {filteredSchedules.length > 0 ? filteredSchedules.map(item => (
                                                <div key={item.id} className="bg-indigo-50/50 p-4 rounded-2xl flex items-center justify-between">
                                                    <span className="text-sm font-bold text-slate-700">{item.text}</span>
                                                    <button onClick={() => deleteSchedule(item.id)} className="text-rose-400"><Icon name="Check" size={16} /></button>
                                                </div>
                                            )) : <div className="text-center py-10 text-slate-300 font-bold italic">No Plans.</div>}
                                            <button onClick={() => setView('edit')} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">予定を追加</button>
                                        </div>
                                    </div>
                                )}
                                {view === 'edit' && (
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl p-6 animate-in">
                                        <textarea value={inputText} onChange={e => setInputText(e.target.value)} className="w-full h-40 p-4 bg-slate-50 rounded-2xl outline-none font-bold" placeholder="何をしますか？" />
                                        <div className="flex gap-2 mt-4">
                                            <button onClick={() => setView('panel')} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">戻る</button>
                                            <button onClick={addSchedule} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">保存</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- メインアプリ ---
        function App() {
            const [step, setStep] = useState('welcome');
            const [isRegistered, setIsRegistered] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [showGlobalCalendar, setShowGlobalCalendar] = useState(false);
            const [userData, setUserData] = useState({ name: '', interests: [], gender: '', age: '', attribute: '' });
            const [savedPapers, setSavedPapers] = useState({});
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [viewDate, setViewDate] = useState(new Date());
            const [selectedNews, setSelectedNews] = useState([]);
            const [previewNews, setPreviewNews] = useState(null);
            const [diary, setDiary] = useState('');
            const [generatedContent, setGeneratedContent] = useState(null);
            const [displayCategories, setDisplayCategories] = useState([]);

            useEffect(() => {
                setDisplayCategories([...CATEGORIES.FIXED, ...[...CATEGORIES.EXTRA].sort(() => 0.5 - Math.random()).slice(0, 3)]);
                const savedUser = localStorage.getItem('yomucale_userdata');
                if (savedUser) { setUserData(JSON.parse(savedUser)); setIsRegistered(true); }
                const savedHistory = localStorage.getItem('yomucale_history');
                if (savedHistory) setSavedPapers(JSON.parse(savedHistory));
            }, []);

            useEffect(() => {
                if (isRegistered) localStorage.setItem('yomucale_userdata', JSON.stringify(userData));
                localStorage.setItem('yomucale_history', JSON.stringify(savedPapers));
            }, [userData, isRegistered, savedPapers]);

            const handleDateSelect = (date) => {
                setSelectedDate(date);
                const paper = savedPapers[formatDateKey(date)];
                if (paper) { setGeneratedContent(paper); setStep('preview'); }
                else { setSelectedNews([]); setDiary(''); setStep('select_news'); }
                setShowGlobalCalendar(false);
            };

            const toggleNewsSelection = (news) => {
                setSelectedNews(prev => prev.find(n => n.id === news.id) ? prev.filter(n => n.id !== news.id) : (prev.length < 3 ? [...prev, news] : prev));
            };

            const filteredNews = useMemo(() => {
                const m = selectedDate.getMonth() + 1;
                const d = selectedDate.getDate();
                return NEWS_KNOWLEDGE_BASE.map(n => ({ ...n, finalScore: (n.month === m && n.day === d ? 10000 : 0) + (userData.interests.includes(n.category) ? 500 : 0) + (n.trendScore || 0) }))
                    .sort((a, b) => b.finalScore - a.finalScore).slice(0, 8);
            }, [userData.interests, selectedDate]);

            const commonProps = {
                onHeaderClick: () => setStep('welcome'),
                showGlobalCalendar,
                setShowGlobalCalendar,
                showScheduleTool: ['register', 'select_date', 'select_news'].includes(step),
                calendarProps: { viewDate, days: getCalendarDays(viewDate), onPrev: () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1)), onNext: () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1)), onDateClick: handleDateSelect, selectedDate, savedPapers }
            };

            if (step === 'welcome') return (
                <div className="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-8 text-center">
                    <Icon name="Newspaper" size={80} className="text-red-600 mb-6 animate-pulse" />
                    <h1 className="text-4xl font-black italic tracking-tighter mb-2">よむカレ</h1>
                    <p className="opacity-70 mb-10">あなたの日常を、新聞の1ページに。</p>
                    <button onClick={() => setStep(isRegistered ? 'select_date' : 'register')} className="w-full max-w-xs bg-red-600 py-4 rounded-full font-bold text-xl shadow-lg active:scale-95 transition-transform">はじめる</button>
                    {isRegistered && <button onClick={() => { localStorage.clear(); location.reload(); }} className="mt-8 text-slate-500 text-xs underline">全データをリセット</button>}
                </div>
            );

            if (step === 'register') return (
                <Layout title="記者登録" onBack={() => setStep('welcome')} {...commonProps}>
                    <div className="space-y-6">
                        <div className="bg-white p-4 rounded-2xl border">
                            <label className="text-[10px] font-black text-slate-300 block mb-1">NAME</label>
                            <input type="text" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} className="w-full text-lg font-bold outline-none" placeholder="名前を入力" />
                        </div>
                        {['gender', 'age', 'attribute'].map(key => (
                            <div key={key} className="bg-white p-4 rounded-2xl border">
                                <label className="text-[10px] font-black text-slate-300 block mb-2">{key.toUpperCase()}</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {(key === 'gender' ? USER_OPTIONS.GENDERS : key === 'age' ? USER_OPTIONS.AGES : USER_OPTIONS.ATTRIBUTES).map(opt => {
                                        const val = typeof opt === 'string' ? opt : opt.value;
                                        return <button key={val} onClick={() => setUserData({...userData, [key]: val})} className={`py-2 rounded-xl text-xs font-bold border-2 ${userData[key] === val ? 'border-red-600 bg-red-50 text-red-600' : 'border-slate-50 text-slate-400'}`}>{typeof opt === 'string' ? opt : opt.label}</button>;
                                    })}
                                </div>
                            </div>
                        ))}
                        <button onClick={() => { setIsRegistered(true); setStep('select_date'); }} disabled={!userData.name} className="w-full py-5 bg-red-600 text-white rounded-2xl font-black disabled:opacity-30">登録完了</button>
                    </div>
                </Layout>
            );

            if (step === 'select_date') return (
                <Layout title="日付選択" onBack={() => setStep('welcome')} {...commonProps}>
                    <CalendarGrid {...commonProps.calendarProps} />
                    <button onClick={() => handleDateSelect(selectedDate)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold">この記事を書く</button>
                </Layout>
            );

            if (step === 'select_news') return (
                <Layout title="トピック選定" onBack={() => setStep('select_date')} {...commonProps}>
                    <div className="space-y-3 mb-6">
                        {filteredNews.map(news => (
                            <div key={news.id} onClick={() => toggleNewsSelection(news)} className={`p-4 rounded-2xl border flex items-center justify-between ${selectedNews.find(n => n.id === news.id) ? 'border-red-600 bg-red-50' : 'bg-white'}`}>
                                <div className="flex-1"><span className="text-[10px] font-bold text-red-600 block">{news.category}</span><h3 className="font-bold text-sm">{news.title}</h3></div>
                                <Icon name={selectedNews.find(n => n.id === news.id) ? "CheckCircle2" : "PlusCircle"} className={selectedNews.find(n => n.id === news.id) ? "text-red-600" : "text-slate-200"} />
                            </div>
                        ))}
                    </div>
                    <button onClick={() => setStep('input_diary')} disabled={selectedNews.length === 0} className="w-full py-4 bg-red-600 text-white rounded-2xl font-bold disabled:opacity-30">次へ ({selectedNews.length}/3)</button>
                </Layout>
            );

            if (step === 'input_diary') return (
                <Layout title="日記執筆" onBack={() => setStep('select_news')} {...commonProps}>
                    <textarea rows={8} value={diary} onChange={e => setDiary(e.target.value)} className="w-full p-6 rounded-3xl border-2 outline-none text-lg mb-6" placeholder="今日はどんな一日でしたか？" />
                    <button onClick={() => { setGeneratedContent({ headline: diary.substring(0, 15), date: selectedDate.toLocaleDateString('ja-JP'), author: userData.name, mainText: diary, news: selectedNews }); setStep('preview'); }} className="w-full py-5 bg-red-600 text-white rounded-2xl font-bold">新聞を発行する</button>
                </Layout>
            );

            if (step === 'preview') return (
                <Layout title="発行完了" onBack={() => setStep('welcome')} {...commonProps}>
                    <div className="bg-[#fdfcf8] border-4 border-slate-900 p-6 rounded shadow-lg mb-6">
                        <div className="border-b-2 border-slate-900 pb-2 mb-4 flex justify-between items-end"><div className="text-xl font-black italic">よむカレ新聞</div><div className="text-[9px] font-bold">{generatedContent.date}</div></div>
                        <h1 className="text-lg font-black mb-4 underline decoration-red-600 decoration-2 underline-offset-4">{generatedContent.headline}</h1>
                        <p className="text-sm leading-relaxed whitespace-pre-wrap">{generatedContent.mainText}</p>
                        <div className="mt-8 pt-4 border-t border-slate-200">
                            <p className="text-[10px] font-bold text-slate-400 mb-2 uppercase">関連ニュース</p>
                            {generatedContent.news.map(n => <div key={n.id} className="text-xs font-bold mb-1">・{n.title}</div>)}
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        <button onClick={() => { setSavedPapers({...savedPapers, [formatDateKey(selectedDate)]: generatedContent}); setStep('welcome'); }} className="py-4 bg-white border-2 border-slate-900 rounded-2xl font-bold">保存する</button>
                        <button onClick={() => setStep('welcome')} className="py-4 bg-slate-900 text-white rounded-2xl font-bold">トップへ</button>
                    </div>
                </Layout>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
